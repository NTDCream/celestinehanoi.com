    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-image: url('assets/images/Hero-bg.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(17, 40, 75, 0.7) 0%, rgba(13, 31, 58, 0.9) 100%);
            z-index: 1;
        }

        .thank-you-container {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(220, 179, 109, 0.3);
            max-width: 600px;
            width: 90%;
            animation: slideUp 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .check-icon {
            font-size: 70px;
            color: #dcb36d; /* Vàng sang trọng */
            margin-bottom: 25px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
            text-shadow: 0 0 30px rgba(220, 179, 109, 0.5);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .thank-you-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            color: #dcb36d;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .thank-you-message {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
            color: rgba(255, 255, 255, 0.9);
        }

        .guest-info {
            color: #dcb36d;
            font-weight: 600;
            font-size: 18px;
        }

        .btn-return {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #dcb36d 0%, #B8A06A 100%);
            color: #11284b;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-return:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(220, 179, 109, 0.4);
            color: #0b1c37;
        }

        .logo-top {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            max-height: 60px;
            z-index: 2;
        }

        @media (max-width: 768px) {
            .thank-you-container {
                padding: 40px 20px;
            }
            .thank-you-title {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PJMR96RM"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <img src="assets/images/logo.png" alt="Celestine Westlake" class="logo-top">

    <div class="thank-you-container">
        <div class="check-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="thank-you-title">Đã đăng ký thành công!</h1>
        <p class="thank-you-message" id="messageContainer">
            Chúng tôi xin phép gửi thông tin báo giá qua Zalo của quý khách <br><span class="guest-info" id="guestName"></span><br>có số đăng ký là <span class="guest-info" id="guestPhone"></span>.
        </p>
        <a href="index.html" class="btn-return" onclick="sessionStorage.removeItem('celestine_guest_name'); sessionStorage.removeItem('celestine_guest_phone');"><i class="fas fa-home"></i> Quay lại trang chủ</a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const name = sessionStorage.getItem('celestine_guest_name');
            const phone = sessionStorage.getItem('celestine_guest_phone');
            
            const nameEl = document.getElementById('guestName');
            const phoneEl = document.getElementById('guestPhone');
            const messageContainer = document.getElementById('messageContainer');

            if (name && phone) {
                nameEl.textContent = name;
                phoneEl.textContent = phone;
                // Xoá thông tin sau khi hiển thị để bảo mật nếu người dùng f5
                // Nhưng có thể giữ lại để user nhìn thấy. Xoá khi bấm Quay lại trang chủ.
            } else {
                // Nếu khách hàng vô tình vào trang này hoặc đã f5/bay session
                messageContainer.innerHTML = 'Hệ thống đã ghi nhận yêu cầu của quý khách.<br>Cố vấn dự án sẽ liên hệ lại qua Zalo/SĐT trong thời gian sớm nhất.';
            }

            // Gửi sự kiện tracking để đảm bảo view cho trang Thank You (tuỳ chọn thêm)
            if (typeof fbq === 'function') {
                fbq('trackCustom', 'ViewThankYouPage');
            }
        });
    </script>
</body>
</html>
