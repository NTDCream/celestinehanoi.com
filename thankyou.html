<!DOCTYPE html>
<html class="light" lang="vi">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Cảm ơn quý khách | Celestine Westlake</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#e2e2e5",
                        "surface-container-high": "#e7e8eb",
                        "secondary-fixed-dim": "#9bcdee",
                        "secondary-fixed": "#c6e7ff",
                        "tertiary": "#735c00",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#9bcdee",
                        "inverse-surface": "#2e3133",
                        "primary-fixed-dim": "#9bcdee",
                        "primary": "#002d41",
                        "surface-variant": "#e2e2e5",
                        "primary-container": "#014460",
                        "surface-dim": "#d9dadc",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#ffe088",
                        "secondary-container": "#acddff",
                        "on-primary-fixed-variant": "#104c68",
                        "tertiary-container": "#cca730",
                        "surface-bright": "#f9f9fc",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#191c1e",
                        "on-secondary-fixed": "#001e2d",
                        "on-primary-container": "#7fb1d1",
                        "on-background": "#191c1e",
                        "outline-variant": "#c1c7ce",
                        "on-secondary-container": "#2e6380",
                        "background": "#f9f9fc",
                        "on-secondary-fixed-variant": "#104c68",
                        "surface-tint": "#306481",
                        "outline": "#71787e",
                        "secondary": "#306481",
                        "error": "#ba1a1a",
                        "primary-fixed": "#c6e7ff",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#41484d",
                        "surface-container": "#edeef0",
                        "on-tertiary-fixed-variant": "#574500",
                        "surface": "#f9f9fc",
                        "inverse-on-surface": "#f0f1f3",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f3f3f6",
                        "on-tertiary-container": "#4e3d00",
                        "on-primary-fixed": "#001e2d",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#e9c349",
                        "on-tertiary-fixed": "#241a00"
                    },
                    fontFamily: {
                        "headline": ["Playfair Display", "serif"],
                        "display": ["Playfair Display", "serif"],
                        "body": ["Playfair Display", "serif"],
                        "label": ["Playfair Display", "serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Playfair Display', serif;
            background-color: #f9f9fc;
            color: #191c1e;
            overflow-x: hidden;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 relative">
    <!-- Background Pattern -->
    <div class="absolute inset-0 z-0 opacity-10"
        style="background-image: radial-gradient(#014460 1px, transparent 1px); background-size: 20px 20px;"></div>

    <div
        class="bg-surface-container-lowest max-w-2xl w-full p-10 md:p-14 rounded-2xl shadow-2xl relative z-10 text-center border-t-4 border-tertiary">

        <div
            class="w-20 h-20 bg-primary-container text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
            <span class="material-symbols-outlined text-4xl">check_circle</span>
        </div>

        <h1 class="text-3xl md:text-5xl text-primary font-headline mb-6">Đăng ký thành công !</h1>

        <p class="text-lg md:text-xl text-on-surface-variant leading-relaxed mb-10">
            Cảm ơn quý khách <span id="customer-name" class="font-bold text-primary"></span> đã yêu cầu nhận báo giá,
            chúng tôi xin phép gửi đầy đủ thông tin dự án qua zalo <span id="customer-phone"
                class="font-bold text-primary"></span> của quý khách trong ít phút.
        </p>

        <div class="space-y-4 flex flex-col items-center">
            <a href="index.html"
                class="inline-flex items-center justify-center gap-2 px-10 py-4 bg-primary-container text-white rounded-lg font-bold tracking-widest uppercase text-sm transition-all hover:bg-opacity-90 hover:shadow-xl active:scale-95">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                Quay lại trang chủ
            </a>

            <p class="text-sm text-outline mt-6 italic">
                Nếu số điện thoại chưa chính xác, quý khách có thể quay lại trang chủ để đăng ký lại.
            </p>
        </div>

    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const nameStr = urlParams.get('name') || 'quý khách';
        let phoneStr = urlParams.get('phone') || '';

        // Strip leading quote if it exists (from the form script)
        if (phoneStr.startsWith("'")) {
            phoneStr = phoneStr.substring(1);
        }

        if (!phoneStr) {
            phoneStr = "của quý khách";
        }

        document.getElementById('customer-name').textContent = nameStr;
        document.getElementById('customer-phone').textContent = phoneStr;
    </script>
</body>

</html>
